name: Auto Check Waste Logs
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    # Thay thế actions/checkout bằng lệnh clone git truyền thống bằng HTTPS
    - name: Bước 1 - Tải mã nguồn bằng lệnh Git thuần túy
      run: |
        git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
        git checkout ${{ github.ref_name }}

    # KHÔNG dùng actions/setup-node nữa, tận dụng Node sẵn có trong máy ảo Ubuntu
    - name: Bước 2 - Kiểm tra phiên bản Node có sẵn
      run: node -v

    - name: Bước 3 - Cài đặt thư viện node-fetch
      run: npm install node-fetch@2

    - name: Bước 4 - Chạy file Script chính
      run: node index.js

    - name: Bước 5 - Lưu lại các ID phế đã gửi
      run: |
        git config --global user.name 'XUONG NHUA AUTOMATION'
        git config --global user.email 'automation-bot@xuongnhua.com'
        git diff --quiet && git diff --staged --quiet || (git add sent_ids.json && git commit -m "Cập nhật lịch sử ID phế đã gửi" && git push)
